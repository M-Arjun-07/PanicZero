<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanicZero | Live Detection Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: rgba(20, 20, 25, 0.7);
            --primary: #00ffcc;
            --danger: #ff3366;
            --warning: #ffcc00;
            --text-main: #f0f0f0;
            --text-muted: #888;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 204, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 51, 102, 0.03) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            transition: all 0.3s ease;
        }

        .status-badge.disconnected {
            background: rgba(255, 51, 102, 0.1);
            border-color: rgba(255, 51, 102, 0.2);
            color: var(--danger);
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulsing 2s infinite;
        }

        .status-badge.disconnected .pulse {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        @keyframes pulsing {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        main {
            flex: 1;
            padding: 3rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            margin: 0;
            line-height: 1.1;
        }

        .subtitle {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .alerts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .alert-card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .alert-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: var(--danger);
        }

        .alert-card.severity-high::before { background: var(--danger); box-shadow: 0 0 15px var(--danger); }
        .alert-card.severity-medium::before { background: var(--warning); box-shadow: 0 0 15px var(--warning); }
        .alert-card.severity-low::before { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .alert-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .alert-source {
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .alert-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Outfit', sans-serif;
        }

        .alert-location {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 15px;
            color: #ccc;
        }

        .alert-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #aaa;
            margin-bottom: 20px;
        }

        .staff-assignment {
            padding-top: 15px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .staff-name {
            color: var(--primary);
            font-weight: 600;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--surface);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            Panic<span>Zero</span>
        </div>
        <div class="status-badge" id="ws-status">
            <div class="pulse"></div>
            <span id="ws-text">Connecting...</span>
        </div>
    </header>

    <main>
        <div class="dashboard-header">
            <div>
                <h1>Live Detection Feed</h1>
                <div class="subtitle">Real-time edge AI analysis from Camera and Audio networks</div>
            </div>
        </div>

        <div class="alerts-grid" id="alerts-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">🛡️</div>
                <h2>All Systems Nominal</h2>
                <p>No active threats detected. Monitoring in progress.</p>
            </div>
        </div>
    </main>

    <script>
        const alertsContainer = document.getElementById('alerts-container');
        const emptyState = document.getElementById('empty-state');
        const wsStatus = document.getElementById('ws-status');
        const wsText = document.getElementById('ws-text');
        
        let activeAlerts = 0;

        function connectWebSocket() {
            // Connect to FastAPI WebSocket
            const ws = new WebSocket('ws://127.0.0.1:8000/ws/dashboard');

            ws.onopen = () => {
                wsStatus.classList.remove('disconnected');
                wsText.textContent = 'System Online';
            };

            ws.onclose = () => {
                wsStatus.classList.add('disconnected');
                wsText.textContent = 'Disconnected - Retrying...';
                setTimeout(connectWebSocket, 3000); // Auto reconnect
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.event === 'NEW_CRISIS' || data.event === 'SIMULATOR_TRIGGERED') {
                    addAlert(data.data);
                }
            };
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function addAlert(alertData) {
            if (activeAlerts === 0) {
                emptyState.style.display = 'none';
            }
            activeAlerts++;

            const severityClass = alertData.severity > 7 ? 'severity-high' : (alertData.severity > 4 ? 'severity-medium' : 'severity-low');
            
            // Format source icon
            let sourceIcon = '🤖';
            if (alertData.source && alertData.source.toLowerCase().includes('camera')) sourceIcon = '📷';
            else if (alertData.source && alertData.source.toLowerCase().includes('audio')) sourceIcon = '🎙️';

            const card = document.createElement('div');
            card.className = `alert-card ${severityClass}`;
            card.innerHTML = `
                <div class="alert-header">
                    <div class="alert-source">
                        ${sourceIcon} ${alertData.source || 'Detection System'}
                    </div>
                    <div class="alert-time">${formatTime(alertData.timestamp)}</div>
                </div>
                <div class="alert-title">${alertData.id || alertData.event_id || 'Alert'}</div>
                <div class="alert-location">📍 ${alertData.location || 'Unknown'}</div>
                <div class="alert-desc">${alertData.description || alertData.details || 'No description provided.'}</div>
                
                <div class="staff-assignment">
                    <span>Response Team:</span>
                    <span class="staff-name">${alertData.assigned_staff || 'Pending Assignment...'}</span>
                </div>
            `;

            // Add to the top of the grid
            alertsContainer.insertBefore(card, alertsContainer.firstChild);
        }

        // Initialize connection
        connectWebSocket();
        
        // Fetch existing active crises on load to populate dashboard
        fetch('http://127.0.0.1:8000/api/crisis/active')
            .then(res => res.json())
            .then(data => {
                if (data.crises && data.crises.length > 0) {
                    // Reverse to add oldest first, so newest ends up on top
                    data.crises.reverse().forEach(crisis => addAlert(crisis));
                }
            })
            .catch(err => console.error("Could not fetch active crises:", err));

    </script>
</body>
</html>
